<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<title>Fake News Detector</title>
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background: radial-gradient(circle at top, #8a7cd3, #5a5dbb);
}

.box {
    width: 500px;
    padding: 100px;

    border-radius: 20px;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);

    box-shadow: 0 8px 32px rgba(0,0,0,0.2);

    text-align: center;
    color: white;
}
h1 {
    margin-bottom: 20px;
}
textarea {
    width: 100%;
    height: 120px;
    display: block;
    margin: 15px 0;
    padding: 15px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.3);
    color: black;
    font-size: 14px;
}

/* Button */
button {
    margin-top: 20px;

    padding: 12px 30px;
    border-radius: 12px;

    border: none;

    background: linear-gradient(135deg, #7f5af0, #6246ea);
    color: white;

    font-size: 16px;
    cursor: pointer;

    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}
#result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: white;
}
</style>
</head>
<body>

<div class="box">
    <h1>📰 Fake News Detector</h1>

    <textarea id="newsInput" placeholder="Enter news here..."></textarea>

   <button onclick="checkNews()">Check</button>
   <p id="result"></p>
</div>

<script>
async function checkNews() {
    const news = document.getElementById("newsInput").value;

    const response = await fetch("http://127.0.0.1:5000/check", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: news   // ✅ VERY IMPORTANT (key must be "text")
        })
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        data.result || data.error;
}
</script>
</body>
</html>
